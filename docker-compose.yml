services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speech-therapy-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: speech-therapy-redis
    ports:
      - "6379:6379"
